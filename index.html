<!DOCTYPE html>
<html>
<head>
    <title>Automotive & EV Career Fields</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .container {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            width: 500px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 0 15px #555;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- Page 1: Student Name -->
<div class="container" id="page1">
    <h2>Step 1: Enter Your Name</h2>
    <label>Student Name:</label>
    <input type="text" id="studentName">
    <button onclick="goToPage2()">Next</button>
</div>

<!-- Page 2: Choose Field -->
<div class="container" id="page2" style="display:none;">
    <h2>Step 2: Choose Your Field</h2>
    <label>Select Career Field:</label>
    <select id="field">
        <!-- Automotive Manufacturing Fields -->
        <option value="Mechanical Design & CAD">Mechanical Design & CAD</option>
        <option value="Manufacturing Processes">Manufacturing Processes</option>
        <option value="Quality & Standards">Quality & Standards</option>
        <option value="Materials Engineering">Materials Engineering</option>
        <option value="Supply Chain & Lean Manufacturing">Supply Chain & Lean Manufacturing</option>
        <!-- EV Ecosystem Fields -->
        <option value="Battery Technology">Battery Technology</option>
        <option value="Power Electronics">Power Electronics</option>
        <option value="Embedded Systems">Embedded Systems</option>
        <option value="Charging Infrastructure">Charging Infrastructure</option>
        <option value="Regulatory Compliance">Regulatory Compliance</option>
    </select>
    <button onclick="goToPage3()">Next</button>
</div>

<!-- Page 3: Recommended Companies -->
<div class="container" id="page3" style="display:none;">
    <h2>Step 3: Recommended Companies</h2>
    <div id="companyOutput"></div>
</div>

<script>
    let studentName = "";
    let field = "";

    // Companies mapped to fields
    const companies = {
        // Automotive Manufacturing
        "Mechanical Design & CAD": ["Tata Motors", "Mahindra & Mahindra", "Bosch"],
        "Manufacturing Processes": ["Maruti Suzuki", "Hyundai", "Toyota"],
        "Quality & Standards": ["Honda", "Ford", "General Motors"],
        "Materials Engineering": ["JSW Steel", "ArcelorMittal", "BASF"],
        "Supply Chain & Lean Manufacturing": ["Ashok Leyland", "TVS Motors", "Infosys (supply chain consulting)"],
        // EV Ecosystem
        "Battery Technology": ["Exide Industries", "Amara Raja Batteries", "Tesla", "BYD"],
        "Power Electronics": ["Siemens", "ABB", "Delta Electronics"],
        "Embedded Systems": ["Bosch", "Continental", "Valeo"],
        "Charging Infrastructure": ["Tata Power", "Fortum", "ChargePoint"],
        "Regulatory Compliance": ["EY", "PwC", "KPMG (automotive consulting)"]
    };

    function goToPage2() {
        studentName = document.getElementById("studentName").value.trim();
        if(studentName === "") {
            alert("Please enter your name.");
            return;
        }
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "block";
    }

    function goToPage3() {
        field = document.getElementById("field").value;
        let recommendedCompanies = companies[field];
        document.getElementById("companyOutput").innerHTML = `
            <h3>Hello, ${studentName}!</h3>
            <p><strong>Chosen Field:</strong> ${field}</p>
            <h4>Recommended Companies:</h4>
            <ul>${recommendedCompanies.map(c => `<li>${c}</li>`).join("")}</ul>
        `;
        document.getElementById("page2").style.display = "none";
        document.getElementById("page3").style.display = "block";
    }
</script>

</body>
</html>
