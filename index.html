<!DOCTYPE html>
<html>
<head>
    <title>Automotive & EV Career Path</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .container {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            width: 600px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 0 15px #555;
        }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input, textarea, select {
            width: 100%; padding: 10px; margin-top: 5px;
            border: 1px solid #ccc; border-radius: 6px;
        }
        button {
            margin-top: 15px; padding: 12px; width: 48%;
            background: #007bff; color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #0056b3; }
        .btn-row { display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<!-- Page 1: Student Name -->
<div class="container" id="page1">
    <h2>Step 1: Enter Your Name</h2>
    <label>Student Name:</label>
    <input type="text" id="studentName">
    <div class="btn-row">
        <button onclick="goToPage2()">Next</button>
    </div>
</div>

<!-- Page 2: Enter Skills -->
<div class="container" id="page2" style="display:none;">
    <h2>Step 2: Enter Your Skills</h2>
    <label>Current Skills (comma separated):</label>
    <textarea id="currentSkills" placeholder="e.g., CAD, Excel, Communication"></textarea>
    <div class="btn-row">
        <button onclick="backToPage1()">Back</button>
        <button onclick="goToPage3()">Next</button>
    </div>
</div>

<!-- Page 3: Choose Desired Field -->
<div class="container" id="page3" style="display:none;">
    <h2>Step 3: Choose Your Desired Field</h2>
    <label>Select Desired Field:</label>
    <select id="field">
        <option value="Automotive Manufacturing">Automotive Manufacturing</option>
        <option value="EV Ecosystem">EV Ecosystem</option>
    </select>
    <div class="btn-row">
        <button onclick="backToPage2()">Back</button>
        <button onclick="goToPage4()">Next</button>
    </div>
</div>

<!-- Page 4: Recommended Skills -->
<div class="container" id="page4" style="display:none;">
    <h2>Step 4: Recommended Skills</h2>
    <div id="skillsOutput"></div>
    <div class="btn-row">
        <button onclick="backToPage3()">Back</button>
        <button onclick="goToPage5()">Next</button>
    </div>
</div>

<!-- Page 5: Learning Path + Companies -->
<div class="container" id="page5" style="display:none;">
    <h2>Step 5: Learning Path & Companies</h2>
    <div id="learningOutput"></div>
    <div class="btn-row">
